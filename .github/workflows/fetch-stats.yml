name: Fetch Project Stats

on:
  schedule:
    - cron: '0 8 * * *'  # Daily at 8am UTC (4pm PHT)
  workflow_dispatch:  # Manual trigger

permissions:
  contents: write

jobs:
  fetch-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Fetch stats
        run: node scripts/fetch-stats.mjs

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet public/stats.json || {
            git add public/stats.json
            git commit -m "chore: update project stats [skip ci]"
            git push
          }
